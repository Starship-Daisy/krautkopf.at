<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Portfolio Dashboard</title>
</head>
<body>

<h1>Mein KI-Musterportfolio</h1>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div style="width: 85%; margin: auto; max-width: 1000px; padding-top: 20px;">
    <canvas id="historyChart"></canvas>
</div>

<pre id="output" style="text-align: center; margin-top: 20px; font-family: monospace; color: #666;">Lade Daten...</pre>

<script>
// Cache-Buster, damit der Browser IMMER frisch vom Server lädt
const cacheBuster = "?v=" + new Date().getTime();

// Wir nutzen einen flexiblen Pfad, der auf GitHub Pages IMMER funktioniert
fetch("portfolio-system/py-data/..portfolio_history.json" + cacheBuster)
  .then(res => {
    if (!res.ok) {
      throw new Error("Server meldet Fehler " + res.status + " (" + res.statusText + "). Datei nicht gefunden oder Pfad falsch.");
    }
    return res.json();
  })
  .then(data => {
    if (!data || data.length === 0) {
      document.getElementById("output").innerText = "Keine historischen Daten vorhanden.";
      return;
    }

    document.getElementById("output").innerText = "Musterdepot-Daten erfolgreich geladen.";

    // 1. Die X-Achse: Alle Datums-Einträge heraussuchen
    const labels = data.map(entry => entry.date);

    // 2. Automatisch alle Spaltennamen herausfinden (außer 'date' und 'Total')
    const allKeys = Object.keys(data[0]);
    const assetNames = allKeys.filter(key => key !== 'date' && key !== 'Total');

    // Schöne, moderne Farben für die Linien im Chart
    const colors = [
      '#36a2eb', // Blau
      '#ff6384', // Rosa/Rot
      '#ffcd56', // Gelb
      '#4bc0c0', // Türkis
      '#9966ff'  // Lila
    ];

    // 3. Für jeden ETF (und Cash) eine eigene Linie (Dataset) bauen
    const datasets = assetNames.map((name, index) => {
      return {
        label: name,
        data: data.map(entry => entry[name] || 0),
        borderColor: colors[index % colors.length],
        backgroundColor: colors[index % colors.length],
        borderWidth: 3,
        fill: false,
        tension: 0.15
      };
    });

    // 4. Den Chart zeichnen
    new Chart(document.getElementById("historyChart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: datasets
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'top',
          }
        },
        scales: { 
          y: { 
            beginAtZero: false,
            title: { display: true, text: 'Wert in Euro (€)', font: { weight: 'bold' } }
          },
          x: {
            title: { display: true, text: 'Datum', font: { weight: 'bold' } }
          }
        }
      }
    });
  })
  .catch(err => {
    console.error(err);
    document.getElementById("output").innerText = "Fehler: " + err.message;
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Dashboard</title>
</head>
<body>

<h1>Mein Portfolio</h1>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="historyChart"></canvas>

<pre id="output">Lade Daten...</pre>

<script>
fetch("https://raw.githubusercontent.com/DEIN_USER/portfolio-system/main/py-data/history.json")
  .then(res => res.json())
  .then(data => {

    const labels = data.map(entry => entry.date);

    const depotA = data.map(entry => entry.DepotA);
    const depotB = data.map(entry => entry.DepotB);
    const depotC = data.map(entry => entry.DepotC);

    new Chart(document.getElementById("historyChart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          {
            label: "Depot A (ESG)",
            data: depotA,
            borderWidth: 2,
            fill: false
          },
          {
            label: "Depot B (Clean Energy)",
            data: depotB,
            borderWidth: 2,
            fill: false
          },
          {
            label: "Depot C (World)",
            data: depotC,
            borderWidth: 2,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: false
          }
        }
      }
    });

  });
</script>

</body>
</html>

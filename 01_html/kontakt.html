<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | krautkopf.at</title>
    
    <link href="https://fonts.bunny.net/css?family=caramel:400|playfair-display:600i,700i,900i|permanent-marker:400|courier-prime:400" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <main class="main-wrapper">
        <header class="grid-section" style="padding-bottom: 0;">
            <h1><a href="../index.html" style="text-decoration: none; color: inherit; font-family: 'Permanent Marker', cursive;">krautkopf.at</a></h1>
        </header>
        
        <section class="contact-section">
            <div class="contact-grid">
                
                <div class="contact-info">
                    <h1>Schreib mir.</h1>
                    <p>Jeder Tastenschlag zählt. Ich freue mich auf deine Nachricht in meiner digitalen Werkstatt.</p>
                    <div style="margin-top: 40px; font-family: 'Courier Prime', monospace; font-size: 0.8rem; color: #999; display: flex; align-items: center; gap: 10px;">
                        <span style="width: 10px; height: 10px; background: #556b2f; border-radius: 50%; display: inline-block;"></span>
                        Schreibmaschinen-Sound aktiv
                    </div>
                </div>

                <div class="contact-form-container">
                    <form action="https://form.taxi/s/ne7rlnub" method="POST" class="contact-form" id="typewriter-form">
                        <div style="display:none;">
                            <input type="text" name="_gotcha" value="" />
                        </div>

                        <div class="input-group">
                            <input type="text" id="name" name="Name" required />
                            <label for="name">Dein Name</label>
                        </div>

                        <div class="input-group">
                            <input type="email" id="email" name="Email" required />
                            <label for="email">Deine E-Mail</label>
                        </div>

                        <div class="input-group">
                            <textarea id="message" name="Nachricht" required></textarea>
                            <label for="message">Deine Nachricht</label>
                        </div>

                        <button type="submit" class="submit-btn">Abschicken!</button>
                    </form>
                </div>

            </div>
        </section>

        <footer class="main-footer">
            <nav class="footer-nav">
                <a href="impressum.html">Impressum</a>
                <a href="datenschutz.html">Datenschutz</a>
                <a href="kontakt.html">Kontakt</a>
            </nav>
            <p class="copyright">
                <a href="../index.html" class="back-link">← zurück zur Hauptseite</a>
            </p>
        </footer>
    </main>

    <script>
        /**
         * SCHREIBMASCHINEN SOUND SYNTHESIZER
         * Erzeugt mechanische Klick-Laute beim Tippen
         */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            // Audio-Kontext starten (Browser blockieren Autoplay oft)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Ein kurzer "Impuls" Sound (wie ein mechanisches Klacken)
            oscillator.type = 'square';
            // Wir variieren die Frequenz minimal für einen organischeren Sound
            oscillator.frequency.setValueAtTime(150 + Math.random() * 50, audioCtx.currentTime);
            
            // Die Lautstärke fällt extrem schnell ab (wie ein Klick)
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        // Alle Eingabefelder im Formular finden
        const form = document.getElementById('typewriter-form');
        const inputs = form.querySelectorAll('input, textarea');

        // Event-Listener für jeden Tastendruck hinzufügen
        inputs.forEach(input => {
            input.addEventListener('keydown', (e) => {
                // Nur Töne abspielen, wenn es keine Funktionstasten sind (wie Shift, Alt)
                if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Enter') {
                    playClickSound();
                }
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | krautkopf.at</title>
    
    <link href="https://fonts.bunny.net/css?family=caramel:400|playfair-display:600i,700i,900i|permanent-marker:400" rel="stylesheet" />
    
    <link rel="stylesheet" href="../02_css/01-design-tokens.css">
    <link rel="stylesheet" href="../02_css/02-base.css">
    <link rel="stylesheet" href="../02_css/03-layout-blog.css">
    <link rel="stylesheet" href="../02_css/04-components.css">
    <link rel="stylesheet" href="../02_css/05-layout-responsive.css">
</head>
<body>

    <main class="main-wrapper">
        <header>
            <h1><a href="../index.html" style="text-decoration: none; color: inherit;">krautkopf.at</a></h1>
        </header>
        
        <article class="legal-content">
            <h1>Schreib mir.</h1>
            <p>Hast du Fragen, Ideen oder willst du einfach nur „Hallo“ sagen? Ich freue mich über Post.</p>

            <form action="https://form.taxi/s/ne7rlnub" method="POST" class="contact-form">
                <div style="display:none;">
                    <input type="text" name="_gotcha" value="" />
                </div>

                <div class="form-group">
                    <label for="name">Dein Name</label>
                    <input type="text" id="name" name="Name" placeholder="Wie darf ich dich nennen?" required />
                </div>

                <div class="form-group">
                    <label for="email">Deine E-Mail</label>
                    <input type="email" id="email" name="Email" placeholder="adresse@beispiel.at" required />
                </div>

                <div class="form-group">
                    <label for="message">Deine Nachricht</label>
                    <textarea id="message" name="Nachricht" rows="6" placeholder="Was gibt's Neues?" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Abschicken!</button>
            </form>
        </article>

        <footer class="main-footer">
            <nav class="footer-nav">
                <a href="impressum.html">Impressum</a>
                <a href="datenschutz.html">Datenschutz</a>
                <a href="kontakt.html">Kontakt</a>
            </nav>
            <p class="copyright">
                <a href="../index.html" class="back-link">← zurück zur Hauptseite</a>
            </p>
        </footer>
    </main>

</body>
</html>

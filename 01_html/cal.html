<style>
      /* 1. Der Schreibblock-Rahmen */
      .calendar-wrapper {
        background-color: #f7f4e9 !important; /* $brand-paper */
        border: 1px solid rgba(74, 93, 78, 0.15) !important;
        border-radius: 6px !important; /* Etwas kantiger, wie ein echter Block */
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03) !important;
        padding: 30px 24px !important;
        position: relative !important;
      }

      /* Die klassische Block-Randlinie links (Margin-Line) */
      .calendar-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50px;
        width: 1px;
        background-color: rgba(139, 157, 131, 0.4) !important; /* $brand-accent Linie */
        z-index: 5;
        pointer-events: none;
      }
      @media (max-width: 768px) {
        .calendar-wrapper::before { left: 30px; }
      }

      /* 2. Das Gitter (Liniertes Papier-Effekt) */
      .fc-theme-standard .fc-scrollgrid {
        border: none !important; /* Entfernt den fetten Außenrahmen */
      }
      .fc-theme-standard td, .fc-theme-standard th {
        border: none !important;
        border-bottom: 1px solid rgba(74, 93, 78, 0.1) !important; /* Nur horizontale Linien */
      }
      
      /* Wochentage (Notizblock-Kopfzeile) */
      .fc-col-header-cell {
        padding: 12px 0 !important;
        border-bottom: 2px solid #4a5d4e !important; /* Dicke Trennlinie oben */
      }
      .fc-col-header-cell-cushion {
        font-family: 'Lora', serif !important;
        color: #4a5d4e !important;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
      }

      /* Tageszahlen */
      .fc-daygrid-day-number {
        font-family: 'Alice', serif !important;
        color: #757a70 !important;
        font-size: 0.95rem;
        padding: 8px !important;
      }

      /* Heute-Markierung (Dezent handschriftlich unterstrichen statt blauem Kreis) */
      .fc-day-today {
        background-color: rgba(139, 157, 131, 0.04) !important; /* Hauchzarter Schimmer */
      }
      .fc-day-today .fc-daygrid-day-number {
        color: #4a5d4e !important;
        font-weight: 700;
        text-decoration: underline dashed #8b9d83 2px !important;
      }

      /* 3. Die Termine (Textmarker- & Tinten-Effekt) */
      .fc-event {
        background-color: rgba(139, 157, 131, 0.15) !important; /* $brand-accent als softer Textmarker */
        border: none !important;
        border-left: 3px solid #4a5d4e !important; /* "Tintentupfer" links */
        color: #2c3e50 !important; /* $brand-ink (Alte Tinte) */
        font-family: 'Open Sans', sans-serif !important;
        padding: 4px 8px !important;
        margin: 3px 0 !important;
        border-radius: 2px !important;
        box-shadow: none !important;
        transition: transform 0.15s ease, background-color 0.15s;
      }
      .fc-event:hover {
        background-color: rgba(139, 157, 131, 0.25) !important;
        transform: translateX(2px); /* Schiebt sich beim Hovern minimal rein */
      }
      .fc-event-title { font-weight: 600 !important; }

      /* 4. Das große Info-Popup (Der ausgerissene Notizzettel) */
      .modal {
        display: none; 
        position: fixed !important; 
        z-index: 999999 !important;
        left: 0 !important;
        top: 0 !important;
        width: 100vw !important; 
        height: 100vh !important; 
        background-color: rgba(44, 62, 80, 0.3) !important; /* Sanfter Füller-Blau-Schleier */
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .modal-content {
        background-color: #fdfcf8 !important; /* Etwas helleres Papier ($brand-light) für Kontrast */
        margin: 15vh auto !important;
        padding: 35px !important;
        border: 1px solid rgba(74, 93, 78, 0.15) !important;
        border-radius: 4px !important;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12) !important;
        
        /* MAGIE: Erzeugt echte hellgraue Schreiblinien im Hintergrund */
        background-image: linear-gradient(rgba(74, 93, 78, 0.07) 1px, transparent 1px) !important;
        background-size: 100% 28px !important;
        
        width: 90% !important;
        max-width: 500px !important;
        position: relative !important;
        box-sizing: border-box !important;
        animation: modalPopIn 0.2s ease-out !important;
      }

      /* Titel im Notizzettel */
      #modalTitle {
        margin-top: 0 !important;
        font-family: 'Lora', serif !important;
        color: #2c3e50 !important; /* Alte Tinte */
        border-bottom: 2px solid #4a5d4e !important;
        padding-bottom: 8px !important;
        font-size: 1.4rem !important;
        line-height: 1.3 !important;
        padding-right: 25px !important;
      }

      /* Der Fließtext sitzt exakt auf den Hintergrundlinien */
      #modalBody {
        font-family: 'Open Sans', sans-serif !important;
        color: #1a1a1a !important;
        font-size: 0.95rem !important;
        line-height: 28px !important; /* Matcht exakt die 28px der Hintergrundlinien! */
        margin-top: 20px !important;
      }
      #modalBody a {
        color: #4a5d4e !important;
        text-decoration: underline !important;
        font-weight: 700 !important;
      }

      /* Schließen-Kreuz */
      .close-modal {
        color: #757a70 !important;
        position: absolute !important;
        top: 15px !important;
        right: 20px !important;
        font-size: 32px !important;
        font-weight: 300 !important;
        line-height: 1 !important;
      }
      .close-modal:hover { color: #2c3e50 !important; }

      /* FullCalendar Toolbar Buttons im Schreibblock-Stil */
      .fc-toolbar-title { font-family: 'Lora', serif !important; color: #4a5d4e !important; }
      .fc-button-primary {
        background-color: transparent !important;
        border-color: rgba(74, 93, 78, 0.2) !important;
        color: #4a5d4e !important;
        font-family: 'Open Sans', sans-serif !important;
        font-size: 0.9rem !important;
      }
      .fc-button-primary:hover, .fc-button-primary.fc-button-active {
        background-color: #4a5d4e !important;
        color: #f7f4e9 !important;
        border-color: #4a5d4e !important;
      }

      @keyframes modalPopIn {
        from { transform: scale(0.97); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
    </style>

</head>

<style>
      /* ======================================================== */
      /* 1. DAS KALENDERFENSTER (Dunkelmodus mit heller Schrift)  */
      /* ======================================================== */
      .calendar-wrapper {
        background-color: #4a5d4e !important; /* $brand-primary */
        border: 1px solid #2c3e50 !important;
        border-radius: 8px !important;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important;
        padding: 24px !important;
      }

      /* Alle Gitter-Zellen dunkel färben */
      .fc-theme-standard .fc-scrollgrid,
      .fc-theme-standard td, 
      .fc-theme-standard th {
        background-color: #4a5d4e !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important; /* Dezente helle Rasterlinien */
      }
      
      /* Wochentage (Kopfzeile) */
      .fc-col-header-cell {
        background-color: #3b4d3f !important; /* Etwas dunkleres Grün abgesetzt */
      }
      .fc-col-header-cell-cushion {
        font-family: 'Lora', serif !important;
        color: #f7f4e9 !important; /* Helle Schrift ($brand-paper) */
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
      }

      /* Die Datumszahlen */
      .fc-daygrid-day-number {
        font-family: 'Alice', serif !important;
        color: #e6e2d5 !important; /* Helle, weiche Schrift */
        font-size: 0.95rem;
        padding: 8px !important;
      }

      /* Heute-Markierung im Dunkelmodus */
      .fc-day-today {
        background-color: #2c3e50 !important; /* Hebt sich als tiefes Tintenblau ab */
      }
      .fc-day-today .fc-daygrid-day-number {
        color: #67a6bd !important; /* Helleres Blau ($brand-ink2) für heute */
        font-weight: 700;
        text-decoration: underline;
      }

      /* Die Termine im dunklen Gitter (Als helle, lesbare Balken) */
      .fc-event {
        background-color: #8b9d83 !important; /* $brand-accent als gut lesbarer Kontrast */
        border: none !important;
        border-left: 4px solid #f7f4e9 !important; /* Weißer Akzentrand */
        color: #2c3e50 !important; /* Dunkle Tinte als Schriftfarbe */
        font-family: 'Open Sans', sans-serif !important;
        padding: 4px 8px !important;
        margin: 3px 2px !important;
        border-radius: 4px !important;
        transition: transform 0.15s ease;
      }
      .fc-event:hover {
        transform: scale(1.02);
        background-color: #9cb094 !important;
      }
      .fc-event-title { font-weight: 700 !important; }

      /* Überschrift & Buttons über dem Kalender */
      .fc-toolbar-title { font-family: 'Lora', serif !important; color: #4a5d4e !important; }
      .fc-button-primary {
        background-color: transparent !important;
        border-color: rgba(74, 93, 78, 0.2) !important;
        color: #4a5d4e !important;
      }
      .fc-button-primary:hover, .fc-button-primary.fc-button-active {
        background-color: #4a5d4e !important;
        color: #f7f4e9 !important;
        border-color: #4a5d4e !important;
      }

      /* ======================================================== */
      /* 2. DIE TEXTFELDER / POPUP (Karierter Block mit roter Linie) */
      /* ======================================================== */
      .modal {
        display: none; 
        position: fixed !important; 
        z-index: 999999 !important;
        left: 0 !important;
        top: 0 !important;
        width: 100vw !important; 
        height: 100vh !important; 
        background-color: rgba(44, 62, 80, 0.4) !important; /* Tintenton gedämpft im Hintergrund */
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
      }

      .modal-content {
        background-color: #fdfcf8 !important; /* Helles Papier ($brand-light) */
        margin: 12vh auto !important;
        
        /* WICHTIG: Innenabstand links vergrößert, damit Text rechts der roten Linie steht */
        padding: 32px 32px 32px 75px !important; 
        
        border: 1px solid rgba(74, 93, 78, 0.15) !important;
        border-radius: 4px !important;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15) !important;
        
        /* KARIERTER BLOCK-LOOK (Erzeugt feine horizontale & vertikale Linien) */
        background-image: 
          linear-gradient(90deg, rgba(74, 93, 78, 0.05) 1px, transparent 1px),
          linear-gradient(rgba(74, 93, 78, 0.05) 1px, transparent 1px) !important;
        background-size: 24px 24px !important; /* Kästchengröße */
        
        width: 90% !important;
        max-width: 520px !important;
        position: relative !important;
        box-sizing: border-box !important;
        animation: modalPopIn 0.2s ease-out !important;
      }

      /* DIE ROTE MARGINALIE (Klassischer roter Randstreifen eines Collegeblocks) */
      .modal-content::before {
        content: '' !important;
        position: absolute !important;
        top: 0 !important;
        bottom: 0 !important;
        left: 56px !important; /* Position der roten Linie */
        width: 1.5px !important;
        background-color: #c94c4c !important; /* Karminrot */
        z-index: 10 !important;
      }

      /* Titel im Schreibblock */
      #modalTitle {
        margin-top: 0 !important;
        font-family: 'Lora', serif !important;
        color: #2c3e50 !important; /* Tintenblau */
        border-bottom: 2px solid #c94c4c !important; /* Roter Akzent passend zur Marginalie */
        padding-bottom: 6px !important;
        font-size: 1.4rem !important;
        line-height: 1.3 !important;
      }

      /* Fließtext exakt auf das 24px-Kästchenraster ausgerichtet */
      #modalBody {
        font-family: 'Open Sans', sans-serif !important;
        color: #1a1a1a !important;
        font-size: 0.95rem !important;
        line-height: 24px !important; /* Matcht exakt die background-size! */
        margin-top: 18px !important;
      }
      #modalBody a {
        color: #4a5d4e !important;
        text-decoration: underline !important;
        font-weight: 700 !important;
      }

      /* Schließen-Kreuz (X) */
      .close-modal {
        color: #757a70 !important;
        position: absolute !important;
        top: 15px !important;
        right: 20px !important;
        font-size: 32px !important;
        font-weight: 300 !important;
        line-height: 1 !important;
        z-index: 11 !important;
      }
      .close-modal:hover { color: #c94c4c !important; }

      @keyframes modalPopIn {
        from { transform: scale(0.96); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
    </style>

</head>

<body>

<section class="contact-section">
  <div class="contact-grid">
    
    <div class="contact-info">
      <h2>Hallo.</h2>
      <p>Hast du Fragen, Ideen oder willst du einfach nur „Hallo“ sagen? Ich freue mich über Post.</p>
      <!-- <a href="mailto:hallo@krautkopf.at" class="email-link">hallo@krautkopf.at</a> -->
    
    </div>
    
    <form action="https://form.taxi/s/ne7rlnub" method="POST" class="contact-form">
      
      <div style="display:none;">
        <input type="text" name="_gotcha" value="" />
      </div>

      <div class="input-group">
        <input type="text" name="Name" id="name" required>
        <label for="name">Dein Name</label>
      </div>

      <div class="input-group">
        <input type="email" name="Email" id="email" required>
        <label for="email">E-Mail Adresse</label>
      </div>

      <div class="input-group">
        <textarea name="Nachricht" id="message" rows="4" required></textarea>
        <label for="message">Deine Nachricht</label>
      </div>

      <button type="submit">← Senden</button>
    </form>

  </div>
</section>

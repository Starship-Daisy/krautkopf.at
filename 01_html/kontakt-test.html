<form action="https://form.taxi/s/ne7rlnub" method="POST" class="contact-form">
    <div style="display:none;">
      <input type="text" name="_gotcha" value="" />
    </div>

<section class="contact-section">
  <div class="contact-grid">
    <div class="contact-info">
      <h2>Hallo.</h2>
      <p>Lass uns über dein Projekt sprechen.</p>
      <a href="mailto:hallo@krautkopf.at" class="email-link">hallo@krautkopf.at</a>
    </div>
    
    <form class="contact-form">
      <div class="input-group">
        <input type="text" id="name" required>
        <label for="name">Dein Name</label>
      </div>
      <div class="input-group">
        <input type="email" id="email" required>
        <label for="email">E-Mail Adresse</label>
      </div>
      <div class="input-group">
        <textarea id="message" rows="4" required></textarea>
        <label for="message">Deine Nachricht</label>
      </div>
      <button type="submit">Senden —></button>
    </form>
  </div>
</section>

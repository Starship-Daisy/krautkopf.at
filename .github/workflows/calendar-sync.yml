name: DSGVO Kalender-Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Kalender in Git speichern
    runs-on: ubuntu-latest

    steps:
      - name: Code von GitHub holen
        uses: actions/checkout@v4

      - name: .ics von Google abholen
        run: |
          mkdir -p js
          curl -sLf "https://calendar.google.com/calendar/ical/wolfgang%40krautkopf.at/public/basic.ics" -o js/werkstatt.ics

      - name: Datei in GitHub einchecken & pushen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add js/werkstatt.ics
          git diff-index --quiet HEAD || (git commit -m "Kalender-Daten automatisch aktualisiert" && git push)
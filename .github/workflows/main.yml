name: FTP Deploy zu Domaintechnik

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Dateien hochladen
    runs-on: ubuntu-latest
    steps:
      - name: Code von GitHub holen
        uses: actions/checkout@v3

      - name: FTP Upload ausführen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # Falls Domaintechnik ein spezielles Verzeichnis will:
          # server-dir: ./html/

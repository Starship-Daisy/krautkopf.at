name: SCSS to CSS Compiler

on:
  push:
    paths:
      - 'scss/**/*.scss' # Startet nur, wenn im scss-Ordner was passiert

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Code holen
        uses: actions/checkout@v4

      - name: 🛠️ Sass installieren
        run: sudo npm install -g sass

      - name: ✨ SCSS zu CSS umwandeln
        # Hier stellen wir sicher, dass der Ordner existiert und Sass Fehler meldet
        run: |
          mkdir -p css
          sass scss/style.scss css/style.css --style=expanded --no-source-map

      - name: 💾 CSS-Datei committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 CSS automatisch generiert"
          file_pattern: 'css/style.css'

          - uses: actions/checkout@v4
  with:
    fetch-depth: 0 # Holt die gesamte Historie, um Merges zu ermöglichen
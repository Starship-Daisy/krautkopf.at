name: SCSS to CSS Compiler

on:
  push:
    paths:
      - 'scss/**/*.scss'

# Hier zentral alle Rechte vergeben. Das gilt jetzt sicher für den gesamten Ablauf!
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Das job-interne "permissions:" wurde gelöscht, damit es die obigen Rechte nicht überschreibt!

    steps:
      - name: 📂 Code holen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Sass installieren
        run: sudo npm install -g sass

      - name: ✨ SCSS zu CSS umwandeln
        run: |
          mkdir -p css
          sass scss/style.scss css/style.css --style=expanded --no-source-map

      - name: 💾 CSS-Datei committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 CSS automatisch generiert"
          file_pattern: 'css/style.css'
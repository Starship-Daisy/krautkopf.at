name: Update Portfolio

on:
  schedule:
    # Läuft jeden Tag um 0:00 Uhr automatisch
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Erlaubt es dir, den Bot jederzeit per Hand im Browser zu starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openai

    - name: Run Live-Kurse (Main)
      run: |
        python portfolio-system/py-bot/main.py

    - name: Run KI-Aufsichtsrat (Mechanik)
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        python portfolio-system/py-bot/mechanik.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add portfolio-system/py-data/*
        git commit -m "update portfolio data" || echo "Keine Änderungen zum Speichern"
        git push origin main  
name: Update Portfolio

on:
  schedule:
    - cron: "0 18 * * *"  # täglich 18:00 UTC
  workflow_dispatch:      # manuell startbar

# Ganz wichtig: Das gibt dem GitHub-Bot die Erlaubnis, 
# die neuen Daten in dein Repository hochzuladen!
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run portfolio script
        working-directory: portfolio-system
        run: python py-bot/main.py

      # Korrigierte Push-Logik, damit GitHub Actions nicht blockiert
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Hier sagen wir dem Bot, dass die Dateien im Unterordner liegen:
          git add portfolio-system/py-data/portfolio.json portfolio-system/py-data/history.json || true
          
          # Nur committen, wenn sich auch wirklich etwas geändert hat
          git diff --quiet && git diff --staged --quiet || (git commit -m "update data" && git push origin main)
name: Update Portfolio

on:
  schedule:
    - cron: "0 18 * * *"  # täglich 18:00 UTC
  workflow_dispatch:      # manuell startbar

# Ganz wichtig: Das gibt dem GitHub-Bot die Erlaubnis, 
# die neuen Daten in dein Repository hochzuladen!
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run portfolio script
        working-directory: portfolio-system
        run: python py-bot/main.py

      # Korrigierte Push-Logik, damit GitHub Actions nicht blockiert
      # NACHHER (Neu und flexibel):
      - name: Commit and push changes
        run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    
      # Hier sagen wir Git, dass es ALLE Dateien im py-data Ordner einpacken soll:
        git add portfolio-system/py-data/* || true
    
      # Nur committen und pushen, wenn sich wirklich etwas geändert hat
        if ! git diff --cached --quiet; then
        git commit -m "update portfolio data"
        git push origin main
        else
        echo "Keine Änderungen vorhanden."
        fi

      
      - name: Install Dependencies
        run: |
          pip install yfinance openai

      - name: Run portfolio script
        working-directory: portfolio-system
        run: python py-bot/main.py

      - name: Run KI Mechanik (Claude via OpenRouter)
        working-directory: portfolio-system
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python py-bot/mechanik.py          
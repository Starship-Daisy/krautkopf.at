name: Update Portfolio

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Upgrade Pip
      run: python -m pip install --upgrade pip

    - name: Install Packages
      run: pip install openai yfinance

    - name: Run Live-Kurse
      run: python portfolio-system/py-bot/main.py

    - name: Run KI-Aufsichtsrat
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: python portfolio-system/py-bot/mechanik.py

    - name: Set Git User
      run: git config --global user.name "github-actions[bot]"

    - name: Set Git Email
      run: git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Spionage Ordner
      run: ls -la portfolio-system/py-data/

    - name: Force Add History
      run: git add -f portfolio-system/py-data/portfolio_history.json || true

    - name: Force Add Ist
      run: git add -f portfolio-system/py-data/ist_portfolio.json || true

    - name: Force Add Strategy
      run: git add -f portfolio-system/py-data/strategy_history.json || true

    - name: Git Commit
      run: git commit -m "update portfolio data FORCE" || echo "Keine Änderungen"

    - name: Git Push
      run: git push origin main
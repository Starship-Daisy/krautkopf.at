name: FTP Deploy zu Domaintechnik

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["SCSS to CSS Compiler"]
    types:
      - completed

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    steps:
      - name: 📂 Code von GitHub holen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # <-- Wieder die volle Version eintragen!
        with:
          fetch-depth: 0

      - name: 📤 Dateien per FTP übertragen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./www/
          protocol: ftp
          port: 21
          force-ipv4: true
          security: loose

name: FTP Deploy zu Domaintechnik

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # Aktualisiert den Kalender alle 6 Stunden vollautomatisch!
  workflow_run:
    workflows: ["SCSS to CSS Compiler"]
    types:
      - completed
  workflow_dispatch: # Aktiviert den manuellen blauen Button für dich!

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    
    # 🔒 ZUKUNFTSSICHER FÜR 2026: Aktiviert Node 24 und schaltet die Deprecation-Warnungen ab
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📂 Code von GitHub holen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📅 .ics von Google abholen und speichern
        run: |
          mkdir -p js
          curl -sLf https://calendar.google.com/calendar/ical/870024d6eb52de1327ee29d66e8a42c6bc96fe39058c554e0d28b9ee2cb7d991%40group.calendar.google.com/private-14b83db2bff490d948f9de400931c326/basic.ics

      - name: 📤 Alle Dateien (inkl. Kalender) verschlüsselt per FTPS übertragen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./www/
          protocol: ftps
          port: 21
          security: strict           # Verschlüsselte TLS-Verbindung erzwingen (Ohne ungültiges force-ipv4)